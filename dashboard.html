<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nuvora — Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--teal:#1A9B72;--teal-light:#22C78F;--black:#0A0A0A;--surface:#111;--border:rgba(255,255,255,0.08);--muted:rgba(255,255,255,0.4)}body{background:var(--black);color:#fff;font-family:'Inter',sans-serif;min-height:100vh}#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}.box{background:#111;border:1px solid var(--border);border-radius:20px;padding:48px;width:100%;max-width:400px;text-align:center}.logo{font-family:'Syne',sans-serif;font-size:24px;margin-bottom:8px}.logo span{color:var(--teal)}.sub{color:var(--muted);font-size:14px;margin-bottom:32px}input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:15px;margin-bottom:16px;outline:none;transition:border-color .2s}input:focus{border-color:var(--teal)}.btn{width:100%;padding:14px;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}.btn:hover{background:var(--teal-light)}.err{color:#ff6b6b;font-size:13px;margin-top:12px;display:none}#dash{display:none}.bar{border-bottom:1px solid var(--border);padding:20px 48px;display:flex;align-items:center;justify-content:space-between}.blogo{font-family:'Syne',sans-serif;font-size:20px}.blogo span{color:var(--teal)}.bright{display:flex;align-items:center;gap:16px}.bdate{color:var(--muted);font-size:13px}.out{padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer}.main{padding:48px;max-width:1200px;margin:0 auto}.ptitle{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px}.psub{color:var(--muted);font-size:14px;margin-bottom:40px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px}.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}.clabel{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}.cval{font-family:'Syne',sans-serif;font-size:36px;font-weight:800}.cval.t{color:var(--teal-light)}.csub{font-size:12px;color:var(--muted);margin-top:6px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}.sec{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px}.stitle{font-size:14px;font-weight:600;margin-bottom:20px}.litem{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}.litem:last-child{border-bottom:none}.lname{font-size:14px;font-weight:500}.lbiz{font-size:12px;color:var(--muted);margin-top:2px}.ldate{font-size:12px;color:var(--muted)}.ritem{padding:12px 0;border-bottom:1px solid var(--border)}.ritem:last-child{border-bottom:none}.rstars{color:#FFB800;font-size:13px;margin-bottom:4px}.rauthor{font-size:13px;font-weight:500}.rtext{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}.empty{color:var(--muted);font-size:13px;text-align:center;padding:32px 0}@media(max-width:768px){.bar{padding:16px 20px}.main{padding:24px 20px}.grid4{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
.rv-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-top:24px;}
.rv-title{font-size:14px;font-weight:600;margin-bottom:20px;}
.rv-form{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end;}
.rv-field label{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block;}
.rv-field input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;outline:none;}
.rv-field input:focus{border-color:var(--teal);}
.rv-btn{padding:12px 20px;background:var(--teal);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;height:44px;white-space:nowrap;}
.rv-btn:hover{background:var(--teal-light);}
.rv-btn:disabled{opacity:.5;cursor:not-allowed;}
.rv-success{color:#22C78F;font-size:13px;margin-top:12px;display:none;}
.rv-error{color:#ff6b6b;font-size:13px;margin-top:12px;display:none;}
</style></head><body><div id="login"><div class="box"><div class="logo"><span>nu</span>vora</div><p class="sub">Performance Dashboard</p><input type="password" id="tin" placeholder="Enter access code"><button class="btn" onclick="doLogin()">Access Dashboard</button><p class="err" id="err">Incorrect access code</p></div></div><div id="dash"><div class="bar"><div class="blogo"><span>nu</span>vora</div><div class="bright"><span class="bdate" id="bdate"></span><button class="out" onclick="doLogout()">Sign out</button></div></div><div class="main"><h1 class="ptitle">Performance Overview</h1><p class="psub" id="mo"></p><div class="grid4"><div class="card"><div class="clabel">Leads this month</div><div class="cval t" id="lm">—</div><div class="csub" id="lt">Total: —</div></div><div class="card"><div class="clabel">Emails sent</div><div class="cval" id="em">—</div><div class="csub" id="et">Total: —</div></div><div class="card"><div class="clabel">Google rating</div><div class="cval t" id="rr">—</div><div class="csub" id="rt">— reviews</div></div><div class="card"><div class="clabel">Automations</div><div class="cval">5</div><div class="csub">email sequences active</div></div></div><div class="grid2"><div class="sec"><div class="stitle">Recent Leads</div><div id="ll"><div class="empty">Loading...</div></div></div><div class="sec"><div class="stitle">Google Reviews</div><div id="rl"><div class="empty">Loading...</div></div></div></div></div></div><script>let tok='';function doLogin(){tok=document.getElementById('tin').value.trim();if(!tok)return;load()}document.getElementById('tin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});function doLogout(){tok='';document.getElementById('dash').style.display='none';document.getElementById('login').style.display='flex';document.getElementById('tin').value=''}async function load(){try{const r=await fetch('/api/dashboard-data?token='+encodeURIComponent(tok));if(r.status===401){document.getElementById('err').style.display='block';return}const d=await r.json();document.getElementById('err').style.display='none';document.getElementById('login').style.display='none';document.getElementById('dash').style.display='block';render(d)}catch(e){document.getElementById('err').style.display='block'}}function render(d){const n=new Date();const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('bdate').textContent=n.toLocaleDateString('en-ZA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('mo').textContent=mo[n.getMonth()]+' '+n.getFullYear();if(d.leads&&!d.leads.error){document.getElementById('lm').textContent=d.leads.thisMonth;document.getElementById('lt').textContent='All-time: '+d.leads.total;const ll=document.getElementById('ll');if(d.leads.recent&&d.leads.recent.length){ll.innerHTML=d.leads.recent.map(l=>'<div class="litem"><div><div class="lname">'+(l.name||'Unknown')+'</div><div class="lbiz">'+(l.business||l.email||'')+'</div></div><div class="ldate">'+new Date(l.created_at).toLocaleDateString('en-ZA')+'</div></div>').join('')}else{ll.innerHTML='<div class="empty">No leads yet this month</div>'}}if(d.emails&&!d.emails.error){document.getElementById('em').textContent=d.emails.thisMonth;document.getElementById('et').textContent='All-time: '+d.emails.total}if(d.reviews&&!d.reviews.error){document.getElementById('rr').textContent=d.reviews.rating?d.reviews.rating.toFixed(1)+' ★':'—';document.getElementById('rt').textContent=d.reviews.total+' Google reviews';const rl=document.getElementById('rl');if(d.reviews.recent&&d.reviews.recent.length){rl.innerHTML=d.reviews.recent.map(r=>'<div class="ritem"><div class="rstars">'+'★'.repeat(r.rating)+'☆'.repeat(5-r.rating)+'</div><div class="rauthor">'+r.author+' · '+r.time+'</div><div class="rtext">'+(r.text||'')+'</div></div>').join('')}else{rl.innerHTML='<div class="empty">No reviews yet</div>'}}}
  async function sendReview() {
    const name = document.getElementById('rv-name').value.trim();
    const email = document.getElementById('rv-email').value.trim();
    const biz = document.getElementById('rv-biz').value.trim();
    if (!name || !email) { document.getElementById('rv-error').textContent = 'Name and email are required.'; document.getElementById('rv-error').style.display = 'block'; return; }
    document.getElementById('rv-btn').disabled = true;
    document.getElementById('rv-success').style.display = 'none';
    document.getElementById('rv-error').style.display = 'none';
    try {
      const r = await fetch('/api/review-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: authToken, clientName: name, clientEmail: email, businessName: biz })
      });
      const data = await r.json();
      if (data.success) {
        document.getElementById('rv-success').style.display = 'block';
        document.getElementById('rv-name').value = '';
        document.getElementById('rv-email').value = '';
        document.getElementById('rv-biz').value = '';
      } else {
        document.getElementById('rv-error').textContent = data.error || 'Failed to send.';
        document.getElementById('rv-error').style.display = 'block';
      }
    } catch(e) {
      document.getElementById('rv-error').textContent = 'Failed to send. Please try again.';
      document.getElementById('rv-error').style.display = 'block';
    }
    document.getElementById('rv-btn').disabled = false;
  }
</script></body></html>
