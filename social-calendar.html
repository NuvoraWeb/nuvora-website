<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Nuvora - Social Media Calendar</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--teal:#1A9B72;--tl:#22C78F;--bk:#0A0A0A;--sf:#111;--bd:rgba(255,255,255,0.08);--mu:rgba(255,255,255,0.4)}body{background:var(--bk);color:#fff;font-family:Inter,sans-serif;min-height:100vh}#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}.box{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:48px;width:100%;max-width:420px;text-align:center}.logo{font-family:Syne,sans-serif;font-size:24px;margin-bottom:8px}.logo span{color:var(--teal)}.sub{color:var(--mu);font-size:14px;margin-bottom:32px}input,select{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--bd);border-radius:10px;color:#fff;font-size:14px;margin-bottom:12px;outline:none}input:focus,select:focus{border-color:var(--teal)}select option{background:#111}.btn{width:100%;padding:14px;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}.err{color:#ff6b6b;font-size:13px;margin-top:12px;display:none}#app{display:none}.bar{border-bottom:1px solid var(--bd);padding:20px 48px;display:flex;align-items:center;justify-content:space-between}.blogo{font-family:Syne,sans-serif;font-size:20px}.blogo span{color:var(--teal)}.out{padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-size:13px;cursor:pointer}.main{padding:48px;max-width:1200px;margin:0 auto}.ptitle{font-family:Syne,sans-serif;font-size:28px;font-weight:800;margin-bottom:8px}.psub{color:var(--mu);font-size:14px;margin-bottom:32px}.sc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:32px;margin-bottom:32px}.sg{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;align-items:end}.fl label{font-size:12px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}.fl input,.fl select{margin-bottom:0}.gb{padding:14px 28px;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;height:48px}.gb:disabled{opacity:.5;cursor:not-allowed}.lb{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:48px;text-align:center;display:none}.sp{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}@keyframes spin{to{transform:rotate(360deg)}}.lt{color:var(--mu);font-size:14px;margin-top:16px}.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.ct{font-family:Syne,sans-serif;font-size:20px;font-weight:800}.db{padding:10px 20px;background:rgba(255,255,255,0.06);border:1px solid var(--bd);border-radius:8px;color:#fff;font-size:13px;cursor:pointer}.leg{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mu)}.ld{width:8px;height:8px;border-radius:50%}.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}.dh{text-align:center;font-size:11px;color:var(--mu);padding:8px 0}.dc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px;min-height:140px;cursor:pointer;transition:border-color .2s}.dc:hover{border-color:var(--teal)}.de{background:transparent!important;border-color:transparent!important;cursor:default!important;min-height:0!important}.dn{font-size:11px;color:var(--mu);margin-bottom:8px;font-weight:600}.dt{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-bottom:6px}.tp{background:rgba(26,155,114,0.2);color:#22C78F}.te{background:rgba(99,102,241,0.2);color:#a5b4fc}.tg{background:rgba(251,191,36,0.2);color:#fcd34d}.ts{background:rgba(236,72,153,0.2);color:#f9a8d4}.dp{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;padding:24px}.mo.open{display:flex}.mb{background:#1a1a1a;border:1px solid var(--bd);border-radius:20px;padding:32px;max-width:560px;width:100%;position:relative;max-height:80vh;overflow-y:auto}.mcl{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer}.md{font-size:12px;color:var(--mu);margin-bottom:4px}.mtp{margin-bottom:16px}.mx{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.04);border-radius:10px;padding:16px;margin-bottom:16px;white-space:pre-wrap}.mpl{font-size:11px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}.mp{font-size:13px;color:var(--mu);background:rgba(255,255,255,0.03);border-radius:8px;padding:12px;line-height:1.6;font-style:italic}.cb{width:100%;padding:12px;background:var(--teal);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px}@media(max-width:900px){.sg{grid-template-columns:1fr 1fr}.cg{grid-template-columns:repeat(4,1fr)}.bar,.main{padding:16px 20px}}</style></head><body><div id="login"><div class="box"><div class="logo"><span>nu</span>vora</div><p class="sub">Social Media Calendar</p><input type="password" id="tin" placeholder="Enter access code"><button class="btn" onclick="doLogin()">Access Calendar</button><p class="err" id="err">Incorrect access code</p></div></div><div id="app"><div class="bar"><div class="blogo"><span>nu</span>vora</div><button class="out" onclick="doLogout()">Sign out</button></div><div class="main"><h1 class="ptitle">Social Media Calendar</h1><p class="psub">Generate a full month of AI-powered posts for your business</p><div class="sc"><div class="sg"><div class="fl"><label>Business name</label><input type="text" id="biz" placeholder="e.g. Mike's Plumbing"></div><div class="fl"><label>Industry</label><select id="ind"><option>Plumbing</option><option>Electrical</option><option>Construction</option><option>Restaurant / Food</option><option>Retail</option><option>Beauty / Hair</option><option>Fitness / Gym</option><option>Legal / Accounting</option><option>Medical / Dental</option><option>Real Estate</option><option selected>Web Design / Tech</option><option>Cleaning Services</option><option>Transport / Logistics</option><option>Education / Tutoring</option><option>Other</option></select></div><div class="fl"><label>Month</label><select id="mon"><option>January</option><option>February</option><option>March</option><option>April</option><option>May</option><option>June</option><option>July</option><option>August</option><option>September</option><option>October</option><option>November</option><option>December</option></select></div><button class="gb" id="gb" onclick="gen()">Generate &#9889;</button></div></div><div class="lb" id="lb"><div class="sp"></div><p class="lt" id="lt">Generating your calendar...</p></div><div id="cw" style="display:none"><div class="ch"><div class="ct" id="ctitle"></div><button class="db" onclick="dlCSV()">&#8659; Download CSV</button></div><div class="leg"><div class="li"><div class="ld" style="background:#22C78F"></div>Promotional</div><div class="li"><div class="ld" style="background:#a5b4fc"></div>Educational</div><div class="li"><div class="ld" style="background:#fcd34d"></div>Engagement</div><div class="li"><div class="ld" style="background:#f9a8d4"></div>Story</div></div><div class="cg" id="dhs"></div><div class="cg" id="cg"></div></div></div></div><div class="mo" id="mo"><div class="mb"><button class="mcl" onclick="closeM()">&#215;</button><div class="md" id="md"></div><div class="mtp" id="mtp"></div><div class="mx" id="mx"></div><div class="mpl">Image prompt</div><div class="mp" id="mpp"></div><button class="cb" onclick="copyP()">Copy post</button></div></div><script>var tok="",posts=[],cBiz="",cMon="";function doLogin(){tok=document.getElementById("tin").value.trim();if(tok)verify();}document.getElementById("tin").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});function verify(){fetch("/api/dashboard-data?token="+encodeURIComponent(tok)).then(function(r){if(r.status===401){document.getElementById("err").style.display="block";return;}document.getElementById("err").style.display="none";document.getElementById("login").style.display="none";document.getElementById("app").style.display="block";var now=new Date();var mo=["January","February","March","April","May","June","July","August","September","October","November","December"];document.getElementById("mon").value=mo[now.getMonth()];}).catch(function(){document.getElementById("err").style.display="block";});}function doLogout(){tok="";document.getElementById("app").style.display="none";document.getElementById("login").style.display="flex";document.getElementById("tin").value="";}function gen(){var biz=document.getElementById("biz").value.trim();var ind=document.getElementById("ind").value;var mon=document.getElementById("mon").value;if(!biz){alert("Please enter your business name");return;}cBiz=biz;cMon=mon;document.getElementById("gb").disabled=true;document.getElementById("cw").style.display="none";document.getElementById("lb").style.display="block";var msgs=["Analysing your industry...","Crafting promotional posts...","Writing educational content...","Creating engagement posts...","Finalising your calendar..."];var mi=0;var iv=setInterval(function(){mi=(mi+1)%msgs.length;document.getElementById("lt").textContent=msgs[mi];},3000);var prompt="You are a South African social media manager. Create a 30-day social media content calendar for \""+biz+"\", a "+ind+" business in South Africa.\n\nReturn ONLY a valid JSON array of exactly 30 objects. No markdown, no explanation, just the raw JSON array. Each object: {day:<1-30>,type:<promo|edu|engage|story>,platform:<Facebook|Instagram|Both>,copy:<2-4 sentences with emojis and 2-3 SA hashtags>,imagePrompt:<one sentence describing ideal image>}\n\nMix: 8 promo, 8 edu, 8 engage, 6 story.";fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,messages:[{role:"user",content:prompt}]})}).then(function(r){return r.json();}).then(function(data){clearInterval(iv);var txt=data.content[0].text.replace(/```json|```/g,"").trim();posts=JSON.parse(txt);document.getElementById("lb").style.display="none";renderCal(mon,posts);document.getElementById("gb").disabled=false;}).catch(function(e){clearInterval(iv);document.getElementById("lb").style.display="none";document.getElementById("gb").disabled=false;alert("Error generating. Please try again.");console.error(e);});}function renderCal(mon,ps){var months=["January","February","March","April","May","June","July","August","September","October","November","December"];var mi=months.indexOf(mon);var yr=new Date().getFullYear();var fd=new Date(yr,mi,1).getDay();var dim=new Date(yr,mi+1,0).getDate();document.getElementById("ctitle").textContent=mon+" "+yr+" — "+cBiz;document.getElementById("dhs").innerHTML=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(function(d){return'<div class="dh">'+d+"</div>";}).join("");var tm={promo:"tp",edu:"te",engage:"tg",story:"ts"};var tl={promo:"Promotional",edu:"Educational",engage:"Engagement",story:"Story"};var h="";for(var i=0;i<fd;i++)h+='<div class="dc de"></div>';for(var d=1;d<=dim;d++){var p=null;for(var j=0;j<ps.length;j++){if(ps[j].day===d){p=ps[j];break;}}if(p){h+='<div class="dc" onclick="openM('+d+')"><div class="dn">'+d+'</div><span class="dt '+tm[p.type]+'">'+tl[p.type]+'</span><div class="dp">'+p.copy+"</div></div>";}else{h+='<div class="dc"><div class="dn">'+d+"</div></div>";}}document.getElementById("cg").innerHTML=h;document.getElementById("cw").style.display="block";}function openM(d){var p=null;for(var i=0;i<posts.length;i++){if(posts[i].day===d){p=posts[i];break;}}if(!p)return;var tm={promo:"tp",edu:"te",engage:"tg",story:"ts"};var tl={promo:"Promotional",edu:"Educational",engage:"Engagement",story:"Story"};document.getElementById("md").textContent=cMon+" "+d;document.getElementById("mtp").innerHTML='<span class="dt '+tm[p.type]+'">'+tl[p.type]+" · "+p.platform+"</span>";document.getElementById("mx").textContent=p.copy;document.getElementById("mpp").textContent=p.imagePrompt;document.getElementById("mo").classList.add("open");}function closeM(){document.getElementById("mo").classList.remove("open");}document.getElementById("mo").addEventListener("click",function(e){if(e.target===this)closeM();});function copyP(){navigator.clipboard.writeText(document.getElementById("mx").textContent).then(function(){var b=document.querySelector(".cb");b.textContent="Copied!";setTimeout(function(){b.textContent="Copy post";},2000);});}function dlCSV(){var h=["Day","Type","Platform","Post Copy","Image Prompt"];var rows=posts.map(function(p){return[p.day,p.type,p.platform,'"'+p.copy.replace(/"/g,'""')+'"','"'+p.imagePrompt.replace(/"/g,'""')+'"']; });var csv=[h.join(",")].concat(rows.map(function(r){return r.join(",");})).join("\n");var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=cBiz.replace(/\s+/g,"-")+"-"+cMon+".csv";a.click();}</script></body></html>
